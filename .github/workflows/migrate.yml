# Voert Prisma-migraties uit op push naar main.
# Gebruikt DIRECT_URL (directe Supabase-verbinding); runtime op Vercel gebruikt DATABASE_URL (pooler).

name: Run database migrations

on:
  push:
    branches: [main]

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrate deploy
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma migrate deploy
